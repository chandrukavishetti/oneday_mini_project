# Application
spring.application.name=expense-claim-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/expense_claim_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=cmk26@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - WORKING VERSION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot.autoconfigure=ERROR
# Disable CORS in Spring Security (if using)
spring.security.enabled=false